<!doctype html>
<html
    lang="en"
    translate="no"
>
    <head>
        <meta charset="utf-8" />
        <link
            rel="icon"
            href="favicon.ico"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, user-scalable=no"
        />
        <meta
            name="theme-color"
            content="#020914"
        />
        <meta
            name="description"
            content="NexoWatt EOS - Energy Operation System"
        />
        <link
            rel="apple-touch-icon"
            href="logo192.png"
        />
        <link
            rel="stylesheet"
            href="css/leaflet.css"
        />
        <link rel="stylesheet" href="css/eos-branding.css?v=9" />
        <link
            rel="manifest"
            href="manifest.json"
            crossorigin="use-credentials"
        />
        <script>
            const script = document.createElement('script');

            window.registerSocketOnLoad = function (cb) {
                window.socketLoadedHandler = cb;
            };

            script.onload = function () {
                typeof window.socketLoadedHandler === 'function' && window.socketLoadedHandler();
            };

            script.onerror = function () {
                console.error('Cannot load socket.io. Retry in 5 seconds');
                setTimeout(function () {
                    window.location.reload();
                }, 5000);
            };

            setTimeout(() => {
                script.src =
                    window.location.port === '3000'
                        ? `${window.location.protocol}//${window.location.hostname}:8081/lib/js/socket.io.js`
                        : './lib/js/socket.io.js';
            }, 1000);

            document.head.appendChild(script);
        </script>
        <script
            type="text/javascript"
            src="./lib/js/sparkline.js"
        ></script>
        <title>NexoWatt EOS - Energy Operation System</title>

        <script>
            window.loginHideLogo = '@@loginHideLogo@@';
            window.loginMotto = 'Energy Operation System';
            window.login = '@@auth@@';
            window.loginLogo = '@@loginLogo@@';
            window.loginLink = '@@loginLink@@';
            window.loginTitle = 'NexoWatt EOS';
            window.loginBackgroundColor = '@@loginBackgroundColor@@';
            window.loginBackgroundImage = '@@loginBackgroundImage@@';

            window.vendorPrefix = '@@vendorPrefix@@';
            window.disableDataReporting = '@@disableDataReporting@@';

            window.loadingBackgroundColor = '@@loadingBackgroundColor@@';
            window.loadingBackgroundImage = '@@loadingBackgroundImage@@';
            window.loadingHideLogo = '@@loadingHideLogo@@';
            window.ssoActive = '@@ssoActive@@';

            // NexoWatt EOS branding: keep login page independent from old Admin/login settings.
            window.loginTitle = 'NexoWatt EOS';
            window.loginMotto = 'Energy Operation System';
            window.loginLogo = 'img/eos/nexowatt-192.png';
            window.loginLink = '#';
            window.loginHideLogo = 'false';
            window.loginBackgroundColor = '#020914';
            window.loadingBackgroundColor = '#020914';
        </script>
        <style>
            .root {
                background-color: rgba(255, 255, 255, 0.87);
                border-radius: 10px;
            }
            .unsupported {
                width: 200px;
                background-color: #aaaaaa;
                margin: auto;
                margin-top: 3rem;
                padding: 10px;
                line-height: 25px;
                border-radius: 4px;
                text-align: center;
            }
            .leaflet-container {
                height: 400px;
                width: 100%;
            }
        </style>
        <script>
            setTimeout(() => {
                const body = document.body;
                if (window.location.search.includes('?login')) {
                    if (window.vendorPrefix === 'HA') {
                        body.style.backgroundColor = '#000000';
                    } else if (
                        window.loginBackgroundColor &&
                        !window.loginBackgroundColor.includes('loginBackgroundColor')
                    ) {
                        // apply image and background color to the whole page as fast as possible
                        body.style.backgroundColor = window.loginBackgroundColor;
                    }
                    if (window.loginBackgroundImage && !window.loginBackgroundImage.includes('loginBackgroundImage')) {
                        body.style.backgroundImage = `url(${window.loginBackgroundImage})`;
                        body.style.backgroundSize = 'cover';
                    }
                } else {
                    if (window.vendorPrefix === 'HA') {
                        body.style.backgroundColor = '#000000';
                    } else if (
                        window.loadingBackgroundColor &&
                        !window.loadingBackgroundColor.includes('loadingBackgroundColor')
                    ) {
                        // apply image and background color to the whole page as fast as possible
                        body.style.backgroundColor = window.loadingBackgroundColor;
                    }
                    if (
                        window.loadingBackgroundImage &&
                        !window.loadingBackgroundImage.includes('loadingBackgroundImage')
                    ) {
                        body.style.backgroundImage = `url(${window.loadingBackgroundImage})`;
                        body.style.backgroundSize = 'cover';
                    }
                }
            }, 0);

            window.addEventListener(
                'load',
                function load(event) {
                    window.removeEventListener('load', load, false);

                    const isMsie = function () {
                        const ua = window.navigator.userAgent;
                        const msie = ua.indexOf('MSIE ');

                        return msie > 0 || !!navigator.userAgent.match(/Trident.*rv\:11\./);
                    };

                    if (isMsie()) {
                        const root = document.getElementById('root');

                        root.classList.add('unsupported');

                        root.innerHTML = 'Browser is not supported. Please use Firefox or Chrome for NexoWatt EOS.';
                    }
                },
                false,
            );
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script
            type="module"
            src="src/index.tsx"
        ></script>
        <script defer src="js/eos-branding.js?v=9"></script>
    </body>
</html>
