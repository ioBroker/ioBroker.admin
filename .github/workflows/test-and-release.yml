# This is a composition of lint and test scripts
# Make sure to update this file along with the others

name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
    push:
        branches:
            - master
        tags:
            # normal versions
            - 'v?[0-9]+.[0-9]+.[0-9]+'
            # pre-releases
            - 'v?[0-9]+.[0-9]+.[0-9]+-**'
    pull_request: {}

permissions:
    id-token: write # Required for OIDC
    contents: write
    pull-requests: read

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22.x

            - name: Install Dependencies
              run: npm run npm

            - name: 'Build backend'
              run: npm run build:backend

            - name: Build
              run: NODE_OPTIONS=--max_old_space_size=8192 npm run build

            - name: Check TypeScript files
              run: |
                  cd src-admin
                  npm run check-ts
              # Wait till js-controller 7 types are available
              continue-on-error: true

    # Runs adapter tests on all supported node versions and OSes
    adapter-tests:
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            needs.check-changes.outputs.readme-only != 'true'

        needs: [build]

        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                node-version: [18.x, 20.x, 22.4.1, 24.x]
                os: [ubuntu-latest, windows-latest, macos-latest]

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install Dependencies
              run: npm i -f

            - name: 'Build backend'
              run: npm run build:backend

            - name: Run local tests
              run: npm test

    adapter-tests-gui:
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            needs.check-changes.outputs.readme-only != 'true'

        needs: [build]

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x

            - name: Install Dependencies
              run: npm run npm

            - name: 'Build backend'
              run: npm run build:backend

            - name: Build
              run: NODE_OPTIONS=--max_old_space_size=8192 npm run build

            - name: Run GUI tests
              run: npm run test:gui

            - name: Archive screenshots
              if: always()
              # if: failure()
              uses: actions/upload-artifact@v7
              with:
                  path: tmp/screenshots/**/*.png
                  retention-days: 3

    deploy:
        needs: [build, adapter-tests-gui]

        # Permissions are required to create GitHub releases and npm trusted publishing
        permissions:
            contents: write
            id-token: write

        # Trigger this step only when a commit on master is tagged with a version number
        if: |
            contains(github.event.head_commit.message, '[skip ci]') == false &&
            github.event_name == 'push' &&
            startsWith(github.ref, 'refs/tags/v')

        runs-on: macos-latest # ubuntu-latest has too few RAM

        steps:
            - uses: ioBroker/testing-action-deploy@v1
              with:
                  node-version: '22.x'
                  build: true
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  sentry-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  sentry-project: 'iobroker-admin'
                  sentry-version-prefix: 'iobroker.admin'
